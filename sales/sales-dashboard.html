<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mozaik Insights — Sales Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;background:#070b17;color:#e5e7eb;margin:0}
.card{background:linear-gradient(180deg,#0f1830,#0c1426);border:1px solid #1f2a44;border-radius:14px}
.kpi{transition:all .2s}.kpi:hover{transform:translateY(-2px);border-color:#3b82f6;box-shadow:0 8px 24px rgba(59,130,246,.15)}
.tab{cursor:pointer;padding:10px 18px;border-radius:10px;font-weight:600;font-size:13px;transition:all .2s;user-select:none}
.tab.active{background:#3b82f6;color:#fff;box-shadow:0 6px 20px rgba(59,130,246,.4)}
.tab:not(.active){background:#111a2e;border:1px solid #1f2a44}
.tab:not(.active):hover{background:#1a2540;border-color:#3b82f6}
.row{transition:background .15s;cursor:pointer}.row:hover{background:#162039}
.row.selected{background:#1e2b4d;border-left:3px solid #3b82f6}
.chip{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600}
.chip-retail{background:#1e3a8a;color:#bfdbfe}
.chip-enterprise{background:#065f46;color:#a7f3d0}
.chip-lighting{background:#7c2d12;color:#fed7aa}
.chip-marketing{background:#581c87;color:#e9d5ff}
select,input{background:#0f1729;border:1px solid #1f2a44;color:#e5e7eb;border-radius:8px;padding:8px 12px;font-size:13px}
.bar{height:6px;border-radius:999px;background:#1f2a44;overflow:hidden}
.bar>div{height:100%;background:linear-gradient(90deg,#3b82f6,#60a5fa)}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-weight:700;color:white}
table{border-collapse:collapse;width:100%}
th,td{padding:10px 8px;font-size:13px;white-space:nowrap}
@media(max-width:768px){
 th,td{padding:8px 4px;font-size:11px}
 .tab{padding:8px 12px;font-size:12px}
 h1{font-size:18px!important}
 .logo{width:32px;height:32px;font-size:12px}
 .card{border-radius:10px}
 select{font-size:12px;padding:6px 8px}
 .scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}
}
thead th{text-align:left;color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #1f2a44}
tbody td{border-bottom:1px solid #121c34}
</style>
<script src="/assets/auth.js"></script>
</head>

const FMT = new Intl.NumberFormat('en-US',{maximumFractionDigits:0});
const CUR='€';
const money = v => CUR+FMT.format(Math.round(v||0));
const moneyK = v => { v=v||0; if(Math.abs(v)>=1e6) return CUR+(v/1e6).toFixed(2)+'M'; if(Math.abs(v)>=1e3) return CUR+(v/1e3).toFixed(0)+'k'; return CUR+Math.round(v); };
const DEPT_COLOR = {Retail:'#3b82f6',Enterprise:'#10b981',Lighting:'#f59e0b',Marketing:'#a855f7'};

let state = {metric:'revenue', range:'all', tab:'overview', selectedRep:null, repSort:'revenue', deptFilter:'all'};

function monthIdx(){
  if(state.range==='all') return [...Array(15).keys()];
  if(state.range==='fy25') return [...Array(12).keys()];
  if(state.range==='fy26') return [12,13,14];
  if(state.range==='q1_26') return [12,13,14];
  if(state.range==='last6') return [9,10,11,12,13,14];
  return [...Array(15).keys()];
}
const sumIdx = (arr) => monthIdx().reduce((s,i)=>s+(arr[i]||0),0);

function computeKpis(){
  const depts = Object.entries(DATA.departments);
  const totalRev = depts.reduce((s,[,d])=>s+sumIdx(d.revenue),0);
  const totalUnits = depts.reduce((s,[,d])=>s+sumIdx(d.units),0);
  const totalNew = depts.reduce((s,[,d])=>s+sumIdx(d.new||[]),0);
  const totalCust = depts.reduce((s,[,d])=>s+sumIdx(d.customers||[]),0);
  const aov = totalUnits? totalRev/totalUnits : 0;
  return {totalRev,totalUnits,totalNew,totalCust,aov};
}

function renderKpis(){
  const k=computeKpis();
  const items=[
    ['Total Revenue',moneyK(k.totalRev),'#3b82f6','💰'],
    ['Units Sold',FMT.format(k.totalUnits),'#10b981','📦'],
    ['Total Customers',FMT.format(k.totalCust),'#a855f7','👥'],
    ['Net New Customers',FMT.format(k.totalNew),'#f59e0b','✨'],
    ['Avg Order Value',moneyK(k.aov),'#ef4444','📈'],
  ];
  document.getElementById('kpis').innerHTML = items.map(([l,v,c,ic])=>
    `<div class="card kpi p-4"><div class="flex justify-between items-start"><div class="text-[10px] text-gray-400 uppercase tracking-wider">${l}</div><span>${ic}</span></div>
     <div class="text-2xl font-bold mt-2" style="color:${c}">${v}</div></div>`).join('');
}

function deptTotals(){
  return Object.entries(DATA.departments).map(([n,d])=>({
    name:n, revenue:sumIdx(d.revenue), units:sumIdx(d.units),
    customers:sumIdx(d.customers||[]), new:sumIdx(d.new||[]), old:sumIdx(d.old||[])
  })).sort((a,b)=>b[state.metric]-a[state.metric]);
}
function repTotals(){
  return DATA.reps.map(r=>({name:r.name,dept:r.dept,revenue:sumIdx(r.revenue),units:sumIdx(r.units)}))
    .sort((a,b)=>b[state.metric]-a[state.metric]);
}

let charts=[];
function destroyCharts(){charts.forEach(c=>c.destroy());charts=[];}

      <canvas id="trendChart" height="110"></canvas>
    </div>

    </div>

      ${[...DATA.reps].map(r=>({name:r.name,dept:r.dept,revenue:sumIdx(r.revenue),units:sumIdx(r.units)})).sort((a,b)=>b.revenue-a.revenue).slice(0,10).map((r,i,arr)=>{const pct=(r.revenue/(arr[0].revenue||1)*100).toFixed(0);return `
        <div class="mb-2">
          <div class="flex justify-between text-xs mb-1">
            <span><span class="text-gray-500 mr-1">#${i+1}</span>${r.name} <span class="chip chip-${r.dept.toLowerCase()} ml-1">${r.dept}</span></span>
            <span class="font-bold">${moneyK(r.revenue)}</span>
          </div>
          <div class="bar"><div style="width:${pct}%"></div></div>
        </div>`}).join('')}
    </div>
    <div class="card p-5">
      <h3 class="font-semibold mb-3">📦 Top Reps by Orders (Units)</h3>
      ${[...DATA.reps].map(r=>({name:r.name,dept:r.dept,revenue:sumIdx(r.revenue),units:sumIdx(r.units)})).sort((a,b)=>b.units-a.units).slice(0,10).map((r,i,arr)=>{const pct=(r.units/(arr[0].units||1)*100).toFixed(0);return `
        <div class="mb-2">
          <div class="flex justify-between text-xs mb-1">
            <span><span class="text-gray-500 mr-1">#${i+1}</span>${r.name} <span class="chip chip-${r.dept.toLowerCase()} ml-1">${r.dept}</span></span>
            <span class="font-bold">${FMT.format(r.units)} orders</span>
          </div>
          <div class="bar"><div style="width:${pct}%;background:linear-gradient(90deg,#10b981,#34d399)"></div></div>
        </div>`}).join('')}
    </div>
    <div class="card p-5">
      <h3 class="font-semibold mb-3">Department Leaderboard</h3>
      ${dt.map((d,i)=>`<div class="flex justify-between items-center py-2 border-b border-gray-800">
        <div><span class="text-gray-500 mr-2">#${i+1}</span><span class="chip chip-${d.name.toLowerCase()}">${d.name}</span></div>
        <div class="font-bold">${state.metric==='revenue'?moneyK(d.revenue):FMT.format(d.units)}</div></div>`).join('')}
      <div class="mt-3 pt-3 border-t border-gray-600 flex justify-between">
        <span class="font-semibold text-gray-400">TOTAL</span>
        <span class="font-bold text-blue-400">${state.metric==='revenue'?moneyK(total):FMT.format(total)}</span>
      </div>
    </div>
  </div>`;
}

function drawOverviewCharts(){
  const mIdx=monthIdx(); const labels=mIdx.map(i=>DATA.months[i]);
  const datasets=Object.entries(DATA.departments).map(([n,d])=>({
    label:n,data:mIdx.map(i=>d[state.metric][i]||0),
    borderColor:DEPT_COLOR[n],backgroundColor:DEPT_COLOR[n]+'22',tension:.35,fill:true,borderWidth:2,pointRadius:3
  }));
  charts.push(new Chart(document.getElementById('trendChart'),{type:'line',data:{labels,datasets},
    options:{responsive:true,plugins:{legend:{labels:{color:'#cbd5e1',font:{size:11}}}},
    scales:{x:{ticks:{color:'#64748b',font:{size:10}},grid:{color:'#1f2a44'}},
    y:{ticks:{color:'#64748b',callback:v=>state.metric==='revenue'?moneyK(v):v},grid:{color:'#1f2a44'}}}}}));
  const dt=deptTotals();
  charts.push(new Chart(document.getElementById('mixChart'),{type:'doughnut',
    data:{labels:dt.map(d=>d.name),datasets:[{data:dt.map(d=>d[state.metric]),backgroundColor:dt.map(d=>DEPT_COLOR[d.name]),borderWidth:0}]},
    options:{plugins:{legend:{position:'bottom',labels:{color:'#cbd5e1',font:{size:11},padding:10}}}}}));
}

function renderDepartments(){
  const dt=deptTotals();
  return `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    ${dt.map(d=>{
      const reps=DATA.reps.filter(r=>r.dept===d.name).map(r=>({...r,total:sumIdx(r[state.metric])})).sort((a,b)=>b.total-a.total);
      const aov=d.units?d.revenue/d.units:0;
      const newPct=d.customers?(d.new/d.customers*100).toFixed(0):0;
      return `<div class="card p-5">
        <div class="flex justify-between items-start mb-4">
          <div>
            <span class="chip chip-${d.name.toLowerCase()}">${d.name}</span>
            <h3 class="text-2xl font-bold mt-2">${moneyK(d.revenue)}</h3>
            <div class="text-gray-400 text-sm mt-1">${FMT.format(d.units)} units · ${FMT.format(d.customers||0)} customers</div>
          </div>
          <div class="text-right space-y-2">
            <div><div class="text-[10px] text-gray-500 uppercase">AOV</div><div class="text-sm font-bold text-blue-400">${moneyK(aov)}</div></div>
            <div><div class="text-[10px] text-gray-500 uppercase">Net New</div><div class="text-sm font-bold text-amber-400">${FMT.format(d.new||0)}</div></div>
            ${d.customers?`<div><div class="text-[10px] text-gray-500 uppercase">New %</div><div class="text-sm font-bold text-emerald-400">${newPct}%</div></div>`:''}
          </div>
        </div>
        <div class="border-t border-gray-800 pt-3">
          <div class="text-[10px] text-gray-500 uppercase mb-2">Team · ${reps.length} reps</div>
          ${reps.map(r=>{const p=(r.total/(reps[0].total||1)*100).toFixed(0);return `
            <div class="mb-2">
              <div class="flex justify-between text-xs mb-1"><span>${r.name}</span><span class="font-semibold">${state.metric==='revenue'?moneyK(r.total):FMT.format(r.total)}</span></div>
              <div class="bar"><div style="width:${p}%;background:${DEPT_COLOR[d.name]}"></div></div>
            </div>`}).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderReps(){
  let rt=DATA.reps.map(r=>({name:r.name,dept:r.dept,revenue:sumIdx(r.revenue),units:sumIdx(r.units),deals:sumIdx(r.units)}));
  if(state.deptFilter && state.deptFilter!=='all') rt=rt.filter(r=>r.dept===state.deptFilter);
  const sortKey=state.repSort||'revenue';
  rt.sort((a,b)=> sortKey==='aov' ? ((b.units?b.revenue/b.units:0)-(a.units?a.revenue/a.units:0)) : (b[sortKey]-a[sortKey]));
  const sel = state.selectedRep;
  const selData = sel?DATA.reps.find(r=>r.name===sel):null;
  return `<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div class="card p-4 md:col-span-2">
      <div class="flex justify-between items-center mb-3 flex-wrap gap-2">
        <h3 class="font-semibold">Sales Representatives <span class="text-xs text-gray-500 font-normal">· click row for details</span></h3>
        <div class="flex gap-2">
          <select onchange="state.deptFilter=this.value;render();">
            <option value="all" ${state.deptFilter==='all'||!state.deptFilter?'selected':''}>All Departments</option>
            <option value="Retail" ${state.deptFilter==='Retail'?'selected':''}>Retail</option>
            <option value="Enterprise" ${state.deptFilter==='Enterprise'?'selected':''}>Enterprise</option>
            <option value="Lighting" ${state.deptFilter==='Lighting'?'selected':''}>Lighting</option>
            <option value="Marketing" ${state.deptFilter==='Marketing'?'selected':''}>Marketing</option>
          </select>
          <select onchange="state.repSort=this.value;render();">
            <option value="revenue" ${sortKey==='revenue'?'selected':''}>Sort: Revenue (Volume €)</option>
            <option value="deals" ${sortKey==='deals'?'selected':''}>Sort: Deals / Orders</option>
            <option value="units" ${sortKey==='units'?'selected':''}>Sort: Units Sold</option>
            <option value="aov" ${sortKey==='aov'?'selected':''}>Sort: Avg Order Value</option>
          </select>
        </div>
      </div>
      <div class="scroll-x"><table><thead><tr><th>#</th><th>Rep</th><th>Dept</th><th class="text-right">Revenue</th><th class="text-right">Deals</th><th class="text-right">Units</th><th class="text-right">AOV</th><th class="text-right">Share</th></tr></thead><tbody>
      ${rt.map((r,i)=>{const tot=rt.reduce((s,x)=>s+x.revenue,0)||1;const share=(r.revenue/tot*100).toFixed(1);return `
        <tr class="row ${sel===r.name?'selected':''}" onclick="selectRep('${r.name}')">
          <td class="text-gray-500">${i+1}</td>
          <td class="font-semibold">${r.name}</td>
          <td><span class="chip chip-${r.dept.toLowerCase()}">${r.dept}</span></td>
          <td class="text-right font-semibold ${sortKey==='revenue'?'text-blue-400':''}">${moneyK(r.revenue)}</td>
          <td class="text-right ${sortKey==='deals'?'text-emerald-400 font-semibold':''}">${FMT.format(r.deals)}</td>
          <td class="text-right ${sortKey==='units'?'text-emerald-400 font-semibold':''}">${FMT.format(r.units)}</td>
          <td class="text-right ${sortKey==='aov'?'text-amber-400 font-semibold':'text-gray-400'}">${r.units?moneyK(r.revenue/r.units):'—'}</td>
          <td class="text-right text-gray-500">${share}%</td>
        </tr>`}).join('')}
      </tbody></table></div>
    </div>
    <div class="card p-5">
      ${sel?`
        <div class="flex justify-between items-start mb-3">
          <div><h3 class="font-bold text-lg">${sel}</h3><span class="chip chip-${selData.dept.toLowerCase()}">${selData.dept}</span></div>
          <button onclick="selectRep(null)" class="text-gray-500 hover:text-white text-xl">×</button>
        </div>
        <div class="grid grid-cols-2 gap-2 mt-4">
          <div class="bg-blue-900/20 p-3 rounded-lg"><div class="text-[10px] text-gray-400 uppercase">Revenue</div><div class="text-xl font-bold text-blue-400">${moneyK(sumIdx(selData.revenue))}</div></div>
          <div class="bg-emerald-900/20 p-3 rounded-lg"><div class="text-[10px] text-gray-400 uppercase">Units</div><div class="text-xl font-bold text-emerald-400">${FMT.format(sumIdx(selData.units))}</div></div>
          <div class="bg-amber-900/20 p-3 rounded-lg"><div class="text-[10px] text-gray-400 uppercase">AOV</div><div class="text-xl font-bold text-amber-400">${sumIdx(selData.units)?moneyK(sumIdx(selData.revenue)/sumIdx(selData.units)):'—'}</div></div>
          <div class="bg-purple-900/20 p-3 rounded-lg"><div class="text-[10px] text-gray-400 uppercase">Best Month</div><div class="text-sm font-bold text-purple-400">${DATA.months[selData.revenue.indexOf(Math.max(...selData.revenue))]}</div></div>
        </div>
        <div class="mt-4"><canvas id="repChart" height="160"></canvas></div>
      `:`<div class="text-gray-500 text-sm text-center py-12">👈 Click a rep to see their details, monthly performance, and KPIs</div>`}
    </div>
  </div>`;
}
function drawRepChart(){
  if(!state.selectedRep) return;
  const r=DATA.reps.find(x=>x.name===state.selectedRep);
  const mIdx=monthIdx();
  charts.push(new Chart(document.getElementById('repChart'),{type:'bar',
    data:{labels:mIdx.map(i=>DATA.months[i]),datasets:[{label:state.metric,data:mIdx.map(i=>r[state.metric][i]),backgroundColor:'#3b82f6',borderRadius:4}]},
    options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#64748b',font:{size:9}},grid:{display:false}},
    y:{ticks:{color:'#64748b',callback:v=>state.metric==='revenue'?moneyK(v):v},grid:{color:'#1f2a44'}}}}}));
}

function renderCustomers(){
  const dt=deptTotals().filter(d=>d.customers>0);
  const totalNew=dt.reduce((s,d)=>s+d.new,0);
  const totalOld=dt.reduce((s,d)=>s+d.old,0);
  return `<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div class="card p-5">
      <h3 class="font-semibold mb-3">New vs Repeat Customers</h3>
      <canvas id="custPie"></canvas>
      <div class="mt-4 space-y-2 text-sm">
        <div class="flex justify-between p-2 bg-amber-900/20 rounded"><span>✨ Net New</span><span class="font-bold text-amber-400">${FMT.format(totalNew)}</span></div>
        <div class="flex justify-between p-2 bg-blue-900/20 rounded"><span>🔁 Repeat</span><span class="font-bold text-blue-400">${FMT.format(totalOld)}</span></div>
        <div class="flex justify-between p-2 bg-gray-800/50 rounded"><span>Total</span><span class="font-bold">${FMT.format(totalNew+totalOld)}</span></div>
        <div class="flex justify-between p-2 bg-gray-800/50 rounded"><span>New Rate</span><span class="font-bold text-emerald-400">${((totalNew/(totalNew+totalOld))*100).toFixed(1)}%</span></div>
      </div>
    </div>
    <div class="card p-5 md:col-span-2">
      <h3 class="font-semibold mb-3">Customer Breakdown by Department</h3>
      <div class="scroll-x"><table><thead><tr><th>Department</th><th class="text-right">Total</th><th class="text-right">New</th><th class="text-right">Repeat</th><th class="text-right">New %</th><th class="text-right">AOV</th></tr></thead><tbody>
      ${dt.map(d=>`<tr class="row"><td><span class="chip chip-${d.name.toLowerCase()}">${d.name}</span></td>
        <td class="text-right font-semibold">${FMT.format(d.customers)}</td>
        <td class="text-right text-amber-400">${FMT.format(d.new)}</td>
        <td class="text-right text-blue-400">${FMT.format(d.old)}</td>
        <td class="text-right">${d.customers?(d.new/d.customers*100).toFixed(0):0}%</td>
        <td class="text-right text-gray-400">${d.units?moneyK(d.revenue/d.units):'—'}</td></tr>`).join('')}
      </tbody></table></div>
      <h3 class="font-semibold mb-2 mt-6">Monthly New vs Repeat Trend</h3>
      <canvas id="custTrend" height="100"></canvas>
    </div>
  </div>`;
}
function drawCustCharts(){
  const dt=deptTotals().filter(d=>d.customers>0);
  const tN=dt.reduce((s,d)=>s+d.new,0), tO=dt.reduce((s,d)=>s+d.old,0);
  charts.push(new Chart(document.getElementById('custPie'),{type:'doughnut',
    data:{labels:['Net New','Repeat'],datasets:[{data:[tN,tO],backgroundColor:['#f59e0b','#3b82f6'],borderWidth:0}]},
    options:{plugins:{legend:{position:'bottom',labels:{color:'#cbd5e1'}}}}}));
  const mIdx=monthIdx();
  charts.push(new Chart(document.getElementById('custTrend'),{type:'line',
    data:{labels:mIdx.map(i=>DATA.months[i]),datasets:[
      {label:'Net New',data:mIdx.map(i=>Object.values(DATA.departments).reduce((s,d)=>s+(d.new?.[i]||0),0)),borderColor:'#f59e0b',backgroundColor:'#f59e0b22',tension:.3,fill:true},
      {label:'Repeat',data:mIdx.map(i=>Object.values(DATA.departments).reduce((s,d)=>s+(d.old?.[i]||0),0)),borderColor:'#3b82f6',backgroundColor:'#3b82f622',tension:.3,fill:true}]},
    options:{plugins:{legend:{labels:{color:'#cbd5e1'}}},scales:{x:{ticks:{color:'#64748b',font:{size:9}},grid:{color:'#1f2a44'}},y:{ticks:{color:'#64748b'},grid:{color:'#1f2a44'}}}}}));
}

function renderAnalysis(){
  const dt=deptTotals(); const rt=repTotals();
  const totalRev=dt.reduce((s,d)=>s+d.revenue,0);
  const topDept=dt[0];
  const topRep=[...rt].sort((a,b)=>b.revenue-a.revenue)[0];
  const aov={};dt.forEach(d=>{aov[d.name]=d.units?d.revenue/d.units:0});
  const aovSorted=Object.entries(aov).sort((a,b)=>b[1]-a[1]);
  const mIdx=monthIdx();
  const monthlyTotals=mIdx.map(i=>Object.values(DATA.departments).reduce((s,d)=>s+d.revenue[i],0));
  const bestMonth=DATA.months[mIdx[monthlyTotals.indexOf(Math.max(...monthlyTotals))]];
  const worstMonth=DATA.months[mIdx[monthlyTotals.indexOf(Math.min(...monthlyTotals))]];
  return `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="card p-6">
      <h3 class="font-semibold mb-4 text-lg">🔎 Key Findings</h3>
      <div class="space-y-3 text-sm">
        <div class="p-3 bg-blue-900/20 border-l-2 border-blue-500 rounded">
          <b>#1 Department: ${topDept.name}</b> — ${moneyK(topDept.revenue)}, ${(topDept.revenue/totalRev*100).toFixed(1)}% of total revenue. Drives the volume engine.
        </div>
        <div class="p-3 bg-emerald-900/20 border-l-2 border-emerald-500 rounded">
          <b>#1 Rep: ${topRep.name} (${topRep.dept})</b> — ${moneyK(topRep.revenue)} across ${FMT.format(topRep.units)} units. AOV ${moneyK(topRep.revenue/topRep.units)}.
        </div>
        <div class="p-3 bg-amber-900/20 border-l-2 border-amber-500 rounded">
          <b>Highest-value dept: ${aovSorted[0][0]}</b> — AOV of ${moneyK(aovSorted[0][1])}/order. Low volume, high margin.
        </div>
        <div class="p-3 bg-purple-900/20 border-l-2 border-purple-500 rounded">
          <b>Best month: ${bestMonth}</b> (${moneyK(Math.max(...monthlyTotals))}) · <b>Weakest: ${worstMonth}</b> (${moneyK(Math.min(...monthlyTotals))})
        </div>
        <div class="p-3 bg-red-900/20 border-l-2 border-red-500 rounded">
          <b>YTD vs Target:</b> YTD revenue €27.59M vs €33.0M target → −16.4% variance. Gap concentrated outside Retail.
        </div>
        <div class="p-3 bg-cyan-900/20 border-l-2 border-cyan-500 rounded">
          <b>Customer mix:</b> Retail 55%/45% repeat/new, Enterprise 59%/41% (sticky contracts), Marketing 30%/70% (acquisition engine).
        </div>
      </div>
    </div>
    <div class="card p-6">
      <h3 class="font-semibold mb-3">Avg Order Value by Department</h3>
      <canvas id="aovChart" height="140"></canvas>
      <h3 class="font-semibold mb-3 mt-6">All Reps · Revenue Distribution</h3>
      <canvas id="repDist" height="140"></canvas>
    </div>
    <div class="card p-6 md:col-span-2">
      <h3 class="font-semibold mb-1">📅 Revenue by Year (2015–2026)</h3>
      <p class="text-xs text-gray-500 mb-3">Company-wide yearly totals. 2026 is YTD (Q1 only).</p>
      <canvas id="yearChart" height="80"></canvas>
    </div>
    <div class="card p-6 md:col-span-2">
      <h3 class="font-semibold mb-1">📦 Stock vs Orders — by Rep</h3>
      <p class="text-xs text-gray-500 mb-3">Stock = sales from existing inventory · Orders (Sipariş) = custom orders placed. Reveals who's selling what they have vs who's driving new orders.</p>
      <canvas id="stockOrderChart" height="90"></canvas>
    </div>
  </div>`;
}
function drawAnalysis(){
  const dt=deptTotals();
  const aov=dt.map(d=>d.units?d.revenue/d.units:0);
  charts.push(new Chart(document.getElementById('aovChart'),{type:'bar',
    data:{labels:dt.map(d=>d.name),datasets:[{data:aov,backgroundColor:dt.map(d=>DEPT_COLOR[d.name]),borderRadius:6}]},
    options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#64748b',callback:v=>moneyK(v)},grid:{color:'#1f2a44'}},y:{ticks:{color:'#cbd5e1'},grid:{display:false}}}}}));
  const rt=repTotals();
  charts.push(new Chart(document.getElementById('repDist'),{type:'bar',
    data:{labels:rt.map(r=>r.name),datasets:[{data:rt.map(r=>r.revenue),backgroundColor:rt.map(r=>DEPT_COLOR[r.dept]),borderRadius:4}]},
    options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#64748b',font:{size:9}},grid:{display:false}},y:{ticks:{color:'#64748b',callback:v=>moneyK(v)},grid:{color:'#1f2a44'}}}}}));
  const yrs=Object.keys(DATA.yearlyTotals||{});const yvals=yrs.map(y=>DATA.yearlyTotals[y]);
  charts.push(new Chart(document.getElementById('yearChart'),{type:'bar',
    data:{labels:yrs,datasets:[{data:yvals,backgroundColor:yrs.map((y,i)=>i===yrs.length-1?'#f59e0b':'#3b82f6'),borderRadius:6}]},
    options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>moneyK(c.parsed.y)}}},scales:{x:{ticks:{color:'#64748b'},grid:{display:false}},y:{ticks:{color:'#64748b',callback:v=>moneyK(v)},grid:{color:'#1f2a44'}}}}}));
  const soReps=DATA.reps.filter(r=>(r.stock||0)+(r.order||0)>0).sort((a,b)=>((b.stock||0)+(b.order||0))-((a.stock||0)+(a.order||0)));
  charts.push(new Chart(document.getElementById('stockOrderChart'),{type:'bar',
    data:{labels:soReps.map(r=>r.name),datasets:[
      {label:'Stock (existing inventory)',data:soReps.map(r=>r.stock||0),backgroundColor:'#f59e0b',borderRadius:4},
      {label:'Orders / Sipariş (custom)',data:soReps.map(r=>r.order||0),backgroundColor:'#3b82f6',borderRadius:4}
    ]},
    options:{plugins:{legend:{labels:{color:'#cbd5e1'}}},scales:{x:{stacked:true,ticks:{color:'#64748b',font:{size:10}},grid:{display:false}},y:{stacked:true,ticks:{color:'#64748b',callback:v=>moneyK(v)},grid:{color:'#1f2a44'}}}}}));
}

function render(){
  destroyCharts();
  renderKpis();
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===state.tab));
  const panels=document.getElementById('panels');
  if(state.tab==='overview'){panels.innerHTML=renderOverview();setTimeout(drawOverviewCharts,0);}
  else if(state.tab==='departments'){panels.innerHTML=renderDepartments();}
  else if(state.tab==='reps'){panels.innerHTML=renderReps();setTimeout(drawRepChart,0);}
  else if(state.tab==='customers'){panels.innerHTML=renderCustomers();setTimeout(drawCustCharts,0);}
  else if(state.tab==='analysis'){panels.innerHTML=renderAnalysis();setTimeout(drawAnalysis,0);}
}
function selectRep(n){state.selectedRep=(state.selectedRep===n||n===null)?null:n;render();}

document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{state.tab=t.dataset.tab;state.selectedRep=null;render();});
document.getElementById('metricSel').onchange=e=>{state.metric=e.target.value;render();};
document.getElementById('rangeSel').onchange=e=>{state.range=e.target.value;render();};
render();
</script>
</body>
</html>
