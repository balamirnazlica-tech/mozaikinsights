<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sales &#8212; Mozaik Insights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css?v=11">
<script src="/assets/auth.js"></script>
</head>
<body class="viewer">
<nav class="nav">
  <div class="nav-inner">
    <a class="brand" href="../"><span class="brand-mark"></span><span class="brand-name">Mozaik Insights</span><span class="brand-sub">analytics hub</span></a>
    <ul>
      <li><a class="link" href="../">Home</a></li>
      <li><a class="link" href="../marketing/">Marketing</a></li>
      <li><a class="link active" href="./">Sales</a></li>
      <li><a class="link" href="../operations/">Operations</a></li>
    </ul>
  </div>
</nav>

<main class="viewer-main">
  <div class="tabbar" id="tabs"></div>
  <div class="frame-host"><iframe id="frame" title="Sales dashboard" loading="eager" allow="fullscreen"></iframe></div>
</main>

<script>
const DASHBOARDS=[
  {id:'sales',label:'Sales Dashboard',url:'./sales-dashboard.html'},
  {id:'crm',label:'CRM Dashboard',url:'./crm-dashboard.html'},
  {id:'bvb',label:'Build vs Buy',url:'./crm-build-vs-buy-dashboard.html'},
  {id:'bvbt',label:'Build vs Buy (Team)',url:'./crm-build-vs-buy-dashboard-team.html'}
];
const frame=document.getElementById('frame'),tabs=document.getElementById('tabs');
function activate(id){const d=DASHBOARDS.find(x=>x.id===id)||DASHBOARDS[0];frame.src=d.url;[...tabs.children].forEach(b=>b.classList.toggle('active',b.dataset.id===d.id));history.replaceState(null,'','#'+d.id);}
DASHBOARDS.forEach(d=>{const b=document.createElement('button');b.textContent=d.label;b.dataset.id=d.id;b.onclick=()=>activate(d.id);tabs.appendChild(b);});
activate(location.hash.replace('#','')||'sales');

window.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();location.reload();}});
setInterval(()=>{try{const f=document.querySelector('.frame-host iframe');if(f&&f.contentWindow&&!f._kb){f._kb=1;f.contentWindow.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();parent.location.reload();}});}}catch(e){}},1000);
</script>
</body>
</html>
