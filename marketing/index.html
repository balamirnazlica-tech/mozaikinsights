<body class="viewer">
<nav class="nav">
  <div class="nav-inner">
    <a class="brand" href="../"><span class="brand-mark"></span><span class="brand-name">Mozaik Insights</span><span class="brand-sub">analytics hub</span></a>
    <ul>

<main class="viewer-main">
  <div class="tabbar" id="tabs"></div>
  <div class="frame-host"><iframe id="frame" title="Marketing dashboard" loading="eager" allow="fullscreen"></iframe></div>
</main>

<script>
const DASHBOARDS=[
  {id:'unified-full',label:'Unified (Full)',url:'./mozaik-unified-dashboard-full.html'},
  {id:'unified',label:'Unified Analytics',url:'./mozaik-unified-dashboard.html'},
  {id:'customer',label:'Customer Intelligence',url:'./mozaik-customer-intelligence.html'},
  {id:'product',label:'Product Intelligence',url:'./mozaik-product-intelligence.html'},
  {id:'orders',label:'Orders',url:'./mozaik-orders-dashboard.html'}
];
const frame=document.getElementById('frame'),tabs=document.getElementById('tabs');
function activate(id){const d=DASHBOARDS.find(x=>x.id===id)||DASHBOARDS[0];frame.src=d.url;[...tabs.children].forEach(b=>b.classList.toggle('active',b.dataset.id===d.id));history.replaceState(null,'','#'+d.id);}
DASHBOARDS.forEach(d=>{const b=document.createElement('button');b.textContent=d.label;b.dataset.id=d.id;b.onclick=()=>activate(d.id);tabs.appendChild(b);});
activate(location.hash.replace('#','')||'unified');
</script>
</body>
