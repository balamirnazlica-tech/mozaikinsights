<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Operations — Mozaik Insights</title>
<link rel="stylesheet" href="../assets/style.css?v=6">
<script src="/assets/auth.js"></script>
</head>
<body class="viewer">
<nav class="nav"><div class="nav-inner"><a href="/" class="logo">🟣 <strong>Mozaik Insights</strong> <span class="tagline">analytics hub</span></a><div class="nav-links"><a href="/">Home</a><a href="/marketing/">Marketing</a><a href="/sales/">Sales</a><a href="/operations/" class="active">Operations</a></div></div></nav>
<main class="viewer-main">
<div class="tabbar" id="tabs"></div>
<div class="frame-host"><iframe id="frame" allowfullscreen></iframe></div>
</main>
<script>
const DASHBOARDS=[
{id:'footfall',label:'Showroom Footfall',url:'./footfall.html'}
];
const tabs=document.getElementById('tabs'),frame=document.getElementById('frame');
function activate(id){const d=DASHBOARDS.find(x=>x.id===id)||DASHBOARDS[0];frame.src=d.url;tabs.querySelectorAll('button').forEach(b=>b.classList.toggle('active',b.dataset.id===d.id));location.hash=d.id;}
DASHBOARDS.forEach(d=>{const b=document.createElement('button');b.textContent=d.label;b.dataset.id=d.id;b.onclick=()=>activate(d.id);tabs.appendChild(b);});
activate(location.hash.replace('#','')||'footfall');
window.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();location.reload();}});
</script>
</body>
</html>
