<link rel="preconnect" href="https://fonts.googleapis.com">

<body class="viewer">
<nav class="nav">
  <div class="nav-inner">
    <a class="brand" href="../"><span class="brand-mark"></span><span class="brand-name">Mozaik Insights</span><span class="brand-sub">analytics hub</span></a>
    <ul>
      <li><a class="link" href="../">Home</a></li>

    </ul>
  </div>
</nav>

<main class="viewer-main">
  <div class="tabbar" id="tabs"></div>
  <div class="frame-host"><iframe id="frame" title="Operations dashboard" loading="eager" allow="fullscreen"></iframe></div>
</main>

<script>
const tabs=[{label:"Showroom Footfall",src:"./footfall.html"}];
const bar=document.getElementById("tabs"),frame=document.getElementById("frame");
let cur=0;
tabs.forEach((t,i)=>{const b=document.createElement("button");b.textContent=t.label;b.onclick=()=>activate(i);bar.appendChild(b)});
function activate(i){cur=i;frame.src=tabs[i].src;bar.querySelectorAll("button").forEach((b,j)=>b.classList.toggle("active",j===i))}
activate(0);
window.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();activate(cur)}});
</script>
</body>
