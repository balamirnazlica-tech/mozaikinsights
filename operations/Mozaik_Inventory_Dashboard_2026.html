<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0b10;color:#e0e0e0;min-height:100vh}

.header{background:linear-gradient(135deg,#0f1221 0%,#1a1035 50%,#0f1221 100%);padding:24px 36px;border-bottom:1px solid rgba(139,92,246,0.15);position:relative;overflow:hidden}
.header::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 30% 50%,rgba(124,58,237,0.08),transparent 70%);pointer-events:none}
.header h1{font-size:26px;font-weight:800;background:linear-gradient(135deg,#c084fc,#818cf8,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;position:relative;z-index:1}
.header p{color:#6b7280;margin-top:3px;font-size:13px;position:relative;z-index:1}
.header .stamp{position:absolute;right:36px;top:50%;transform:translateY(-50%);background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.2);border-radius:10px;padding:8px 16px;font-size:12px;color:#a78bfa;z-index:1}

.nav{display:flex;gap:4px;padding:10px 36px;background:#0d0e16;border-bottom:1px solid rgba(255,255,255,0.05);flex-wrap:wrap;position:sticky;top:0;z-index:100}
.nav button{padding:7px 14px;border:1px solid rgba(255,255,255,0.07);background:transparent;color:#6b7280;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;transition:all 0.2s;white-space:nowrap}
.nav button:hover{border-color:rgba(139,92,246,0.4);color:#a78bfa;background:rgba(139,92,246,0.05)}
.nav button.active{background:linear-gradient(135deg,#7c3aed,#6366f1);color:white;border-color:transparent;box-shadow:0 2px 12px rgba(124,58,237,0.3)}

.dash{padding:20px 36px;max-width:1680px;margin:0 auto}
.section{display:none}.section.active{display:block}

.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:22px}
.kpi{background:linear-gradient(145deg,#12141f,#161929);border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:18px;position:relative;overflow:hidden;transition:transform 0.2s}
.kpi:hover{transform:translateY(-2px)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.v::before{background:linear-gradient(90deg,#7c3aed,#a78bfa)}.kpi.b::before{background:linear-gradient(90deg,#3b82f6,#60a5fa)}
.kpi.g::before{background:linear-gradient(90deg,#10b981,#34d399)}.kpi.o::before{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.kpi.r::before{background:linear-gradient(90deg,#ef4444,#f87171)}.kpi.p::before{background:linear-gradient(90deg,#ec4899,#f472b6)}
.kpi.c::before{background:linear-gradient(90deg,#06b6d4,#22d3ee)}.kpi.y::before{background:linear-gradient(90deg,#eab308,#fde047)}
.kpi .label{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:#4b5563;margin-bottom:6px;font-weight:600}
.kpi .value{font-size:28px;font-weight:900;line-height:1}
.kpi.v .value{color:#a78bfa}.kpi.b .value{color:#60a5fa}.kpi.g .value{color:#34d399}.kpi.o .value{color:#fbbf24}
.kpi.r .value{color:#f87171}.kpi.p .value{color:#f472b6}.kpi.c .value{color:#22d3ee}.kpi.y .value{color:#fde047}
.kpi .sub{font-size:10px;color:#4b5563;margin-top:4px}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:18px}
.g23{display:grid;grid-template-columns:2fr 3fr;gap:16px;margin-bottom:18px}
.g32{display:grid;grid-template-columns:3fr 2fr;gap:16px;margin-bottom:18px}
@media(max-width:1100px){.g2,.g3,.g23,.g32{grid-template-columns:1fr}}

.card{background:linear-gradient(145deg,#12141f,#161929);border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:20px;overflow:hidden}
.card h3{font-size:14px;font-weight:600;margin-bottom:14px;color:#c4b5fd;display:flex;align-items:center;gap:8px}
.card h3 .icon{font-size:16px}
.card canvas{max-height:300px}

table{width:100%;border-collapse:collapse}
table th{text-align:left;padding:8px 10px;font-size:10px;text-transform:uppercase;letter-spacing:0.7px;color:#4b5563;border-bottom:1px solid rgba(255,255,255,0.06);font-weight:700;position:sticky;top:0;background:#12141f}
table td{padding:7px 10px;font-size:12px;border-bottom:1px solid rgba(255,255,255,0.03)}
table tr:hover td{background:rgba(124,58,237,0.04)}
.mono{font-family:'JetBrains Mono',monospace;font-size:11px;color:#6b7280}

.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.badge.low{background:rgba(239,68,68,0.12);color:#f87171}.badge.med{background:rgba(245,158,11,0.12);color:#fbbf24}
.badge.high{background:rgba(16,185,129,0.12);color:#34d399}.badge.info{background:rgba(99,102,241,0.12);color:#818cf8}
.badge.pink{background:rgba(236,72,153,0.12);color:#f472b6}

.bar-h{margin-top:6px}
.bar-row{display:flex;align-items:center;margin-bottom:5px;gap:6px}
.bar-label{width:120px;font-size:11px;color:#9ca3af;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.bar-track{flex:1;height:20px;background:rgba(255,255,255,0.03);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:6px;font-size:10px;font-weight:700;color:white;min-width:28px;transition:width 0.6s ease}
.bf-v{background:linear-gradient(90deg,#7c3aed,#a78bfa)}.bf-b{background:linear-gradient(90deg,#3b82f6,#60a5fa)}
.bf-g{background:linear-gradient(90deg,#10b981,#34d399)}.bf-o{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.bf-r{background:linear-gradient(90deg,#ef4444,#f87171)}.bf-p{background:linear-gradient(90deg,#ec4899,#f472b6)}
.bf-c{background:linear-gradient(90deg,#06b6d4,#22d3ee)}

.search{width:100%;padding:10px 14px;background:#0f1019;border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:white;font-size:13px;margin-bottom:12px}
.search:focus{outline:none;border-color:#7c3aed;box-shadow:0 0 0 2px rgba(124,58,237,0.15)}
.search::placeholder{color:#374151}

.catalog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.pcard{background:linear-gradient(145deg,#12141f,#161929);border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:16px;transition:all 0.2s;cursor:default}
.pcard:hover{border-color:rgba(124,58,237,0.3);transform:translateY(-2px);box-shadow:0 4px 20px rgba(124,58,237,0.1)}
.pcard .brand{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:#7c3aed;margin-bottom:4px;font-weight:700}
.pcard .pname{font-size:13px;font-weight:600;color:#e5e7eb;margin-bottom:3px;line-height:1.3}
.pcard .pcode{font-size:10px;color:#4b5563;margin-bottom:8px;font-family:monospace}
.pcard .pqty{font-size:22px;font-weight:900}
.pcard .pqty.ok{color:#34d399}.pcard .pqty.warn{color:#fbbf24}.pcard .pqty.crit{color:#f87171}
.pcard .pcat{font-size:10px;color:#6b7280;margin-top:3px}

.alert{padding:12px 16px;border-radius:8px;margin-bottom:8px;display:flex;align-items:center;gap:10px;font-size:12px}
.alert.danger{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15)}
.alert.warning{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.15)}
.alert.info{background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.15)}
.alert.success{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.15)}
.alert strong{color:#fbbf24}

.scroll{max-height:380px;overflow-y:auto}
.scroll::-webkit-scrollbar{width:5px}.scroll::-webkit-scrollbar-track{background:transparent}.scroll::-webkit-scrollbar-thumb{background:#1f2937;border-radius:3px}

.sec-title{font-size:18px;font-weight:700;margin-bottom:16px;color:#e5e7eb;display:flex;align-items:center;gap:8px}
.sec-title .dot{width:8px;height:8px;border-radius:50%}

.expand-btn{padding:4px 10px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#9ca3af;border-radius:5px;cursor:pointer;font-size:11px;margin-top:8px;transition:all 0.2s}
.expand-btn:hover{border-color:#7c3aed;color:#a78bfa}

.detail-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.detail-chip{font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(99,102,241,0.1);color:#818cf8}

.heatmap-row{display:flex;gap:2px;margin-bottom:2px;align-items:center}
.heatmap-label{width:100px;font-size:10px;color:#9ca3af;text-align:right;padding-right:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.heatmap-cell{height:28px;min-width:60px;flex:1;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:white;transition:transform 0.2s}
.heatmap-cell:hover{transform:scale(1.05)}
.heatmap-header{font-size:9px;color:#6b7280;text-align:center;font-weight:600}
</style>
</head>

function fmt(n){return n.toLocaleString('en-US')}
function pct(n,t){return t?((n/t)*100).toFixed(1)+'%':'0%'}

function go(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  const btns=[...document.querySelectorAll('.nav button')];
  const idx=['overview','warehouse','categories','transit','customers','showroom','lighting','maxx','brands','alerts','deliveries','catalog'].indexOf(id);
  if(idx>=0)btns[idx].classList.add('active');
  if(!rendered[id]){renders[id]();rendered[id]=true}
}

function bars(el,items,cls,max){
  if(!max)max=items[0]?.qty||1;
  el.innerHTML=items.map(it=>{
    const p=Math.max(4,(it.qty/max)*100);
    return `<div class="bar-row"><div class="bar-label">${it.name}</div><div class="bar-track"><div class="bar-fill bf-${cls}" style="width:${p}%">${fmt(it.qty)}</div></div></div>`;
  }).join('');
}

function tbl(el,items,cols){
  let h='<table><thead><tr>'+cols.map(c=>`<th>${c.l}</th>`).join('')+'</tr></thead><tbody>';
  items.forEach((it,i)=>{h+='<tr>'+cols.map(c=>`<td>${c.fn?c.fn(it,i):it[c.k]}</td>`).join('')+'</tr>'});
  h+='</tbody></table>';
  if(typeof el==='string')document.getElementById(el).innerHTML=h;
  else el.innerHTML=h;
  return h;
}

function pie(id,labels,vals,pos){
  return new Chart(document.getElementById(id),{type:'doughnut',data:{labels,datasets:[{data:vals,backgroundColor:COLORS,borderWidth:0,hoverOffset:6}]},options:{responsive:true,cutout:'55%',plugins:{legend:{position:pos||'right',labels:{color:'#6b7280',font:{size:10},padding:6,boxWidth:10}}}}});
}

function hbar(id,labels,vals,color){
  return new Chart(document.getElementById(id),{type:'bar',data:{labels,datasets:[{data:vals,backgroundColor:color||'#7c3aed',borderWidth:0,borderRadius:3,barThickness:16}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#4b5563',font:{size:10}},grid:{color:'rgba(255,255,255,0.03)'}},y:{ticks:{color:'#9ca3af',font:{size:10}},grid:{display:false}}}}});
}

renders.categories=function(){
  const el=document.getElementById('sec-categories');
  const wCats=D.warehouse.categories;
  const sCats=D.subasi.categories;
  const srCats=D.showroom.categories;
  el.innerHTML=`
  <div class="sec-title"><div class="dot" style="background:#10b981"></div>Product Category Analysis</div>
  <div class="g2">
    <div class="card"><h3>Oto Sanayi — Categories</h3><canvas id="cat-wh"></canvas></div>
    <div class="card"><h3>Subaşı — Categories</h3><canvas id="cat-sub"></canvas></div>
  </div>
  <div class="g2">
    <div class="card"><h3>Showroom — Categories</h3><canvas id="cat-sr"></canvas></div>
    <div class="card"><h3>Customer Goods — Categories</h3><canvas id="cat-cg"></canvas></div>
  </div>
  <div class="g2">
    <div class="card"><h3>Transit — Categories</h3><canvas id="cat-tr"></canvas></div>
    <div class="card"><h3>Delivered — Categories</h3><canvas id="cat-dl"></canvas></div>
  </div>
  <div class="card" style="margin-bottom:18px"><h3>Brand × Category Heatmap (Top Brands in Oto Sanayi)</h3><div id="heatmap" style="overflow-x:auto"></div></div>`;

  function catPie(id,cats){
    const c=cats.filter(x=>x.name!=='Other').slice(0,12);
    pie(id,c.map(x=>x.name),c.map(x=>x.qty));
  }
  catPie('cat-wh',wCats);catPie('cat-sub',sCats);catPie('cat-sr',srCats);
  catPie('cat-cg',D.customer_goods.categories);catPie('cat-tr',D.transit.categories);catPie('cat-dl',D.delivered.categories);

  // Heatmap
  const matrix=D.warehouse.brand_cat_matrix;
  const brandNames=Object.keys(matrix);
  const allCats=new Set();
  brandNames.forEach(b=>Object.keys(matrix[b]).forEach(c=>allCats.add(c)));
  const catList=[...allCats].filter(c=>c!=='Other').sort();
  let hm='<div style="margin-left:106px;display:flex;gap:2px;margin-bottom:4px">'+catList.map(c=>`<div class="heatmap-header" style="min-width:60px;flex:1">${c.substring(0,12)}</div>`).join('')+'</div>';
  brandNames.forEach(b=>{
    hm+=`<div class="heatmap-row"><div class="heatmap-label">${b}</div>`;
    catList.forEach(c=>{
      const v=matrix[b][c]||0;
      const maxV=Math.max(...Object.values(matrix[b]));
      const intensity=v?Math.max(0.15,v/maxV):0;
      const bg=v?`rgba(124,58,237,${intensity})`:'rgba(255,255,255,0.02)';
      hm+=`<div class="heatmap-cell" style="background:${bg}">${v||''}</div>`;
    });
    hm+='</div>';
  });
  document.getElementById('heatmap').innerHTML=hm;
};

  new Chart(document.getElementById('bi-stacked'),{
    type:'bar',
    data:{
      labels:top15.map(b=>b.name),
      datasets:[
        {label:'Warehouse',data:top15.map(b=>b.warehouse),backgroundColor:'#7c3aed'},
        {label:'Subaşı',data:top15.map(b=>b.subasi),backgroundColor:'#3b82f6'},
        {label:'Showroom',data:top15.map(b=>b.showroom),backgroundColor:'#10b981'},
        {label:'Customer',data:top15.map(b=>b.customer),backgroundColor:'#ef4444'},
        {label:'Transit',data:top15.map(b=>b.transit),backgroundColor:'#f59e0b'}
      ]
    },
    options:{responsive:true,scales:{x:{stacked:true,ticks:{color:'#6b7280',font:{size:9}}},y:{stacked:true,ticks:{color:'#6b7280'},grid:{color:'rgba(255,255,255,0.03)'}}},plugins:{legend:{position:'bottom',labels:{color:'#9ca3af',font:{size:10}}}}}
  });

  // Delivery vs Stock
  new Chart(document.getElementById('bi-del-vs-stock'),{
    type:'bar',
    data:{
      labels:top15.map(b=>b.name),
      datasets:[
        {label:'Current Stock (all locations)',data:top15.map(b=>b.total),backgroundColor:'#6366f1'},
        {label:'Delivered',data:top15.map(b=>b.delivered),backgroundColor:'rgba(16,185,129,0.5)'}
      ]
    },
    options:{responsive:true,scales:{x:{ticks:{color:'#6b7280',font:{size:9}}},y:{ticks:{color:'#6b7280'},grid:{color:'rgba(255,255,255,0.03)'}}},plugins:{legend:{position:'bottom',labels:{color:'#9ca3af',font:{size:10}}}}}
  });
};

// ==================== ALERTS ====================
renders.alerts=function(){
  const el=document.getElementById('sec-alerts');
  el.innerHTML=`
  <div class="sec-title"><div class="dot" style="background:#ef4444"></div>Alerts, Warnings & Low Stock</div>
  <div class="kpi-row">
    <div class="kpi r"><div class="label">Critical Low Stock (≤2)</div><div class="value">${fmt(D.low_stock_count)}</div><div class="sub">Branded products in main warehouse</div></div>
    <div class="kpi o"><div class="label">Incoming Transit</div><div class="value">${fmt(D.transit.total_qty)}</div><div class="sub">Items on the way</div></div>
    <div class="kpi p"><div class="label">Pending Reservations</div><div class="value">${fmt(D.reserved.total_qty)}</div></div>
    <div class="kpi b"><div class="label">Customer Goods Held</div><div class="value">${fmt(D.customer_goods.total_qty)}</div></div>
  </div>
  <div id="alert-msgs" style="margin-bottom:18px"></div>
  <div class="card"><h3>Low Stock Products (≤2 Units)</h3>
    <input type="text" class="search" id="ls-search" placeholder="Search low stock by name, brand, code...">
    <div class="scroll" id="ls-tbl" style="max-height:600px"></div>
  </div>`;

  const am=document.getElementById('alert-msgs');
  am.innerHTML=`
    <div class="alert danger">⚠️ <strong>${fmt(D.low_stock_count)} products at critical stock levels</strong> — immediate reorder review recommended for high-demand items</div>
    <div class="alert warning">🚚 <strong>${fmt(D.transit.total_qty)} items in transit</strong> (${pct(D.transit.total_qty,D.warehouse.total_qty+D.subasi.total_qty)} of combined warehouse) — top incoming: ${D.transit.brands.slice(0,5).map(b=>b.name).join(', ')}</div>
    <div class="alert warning">📦 <strong>${D.customer_goods.customer_count} customer accounts</strong> with ${fmt(D.customer_goods.total_qty)} items stored — top: ${D.customer_goods.customers.slice(0,3).map(c=>c.name).join(', ')}</div>
    <div class="alert info">🏨 Maxx Royal has <strong>${fmt(D.maxx_royal.total_qty)} dedicated items</strong> across ${D.maxx_royal.brands.length} brands</div>
    <div class="alert info">🏪 Showroom holds <strong>${fmt(D.showroom.total_qty)} items</strong> — top brand: ${D.showroom.brands[0].name} (${fmt(D.showroom.brands[0].qty)})</div>
    <div class="alert success">✅ <strong>${fmt(D.delivered.total_qty)} total items delivered</strong> to customers across all tracked projects</div>`;

  function renderLS(filter){
    let items=D.low_stock_samples;
    if(filter){const f=filter.toLowerCase();items=items.filter(it=>(it.name+' '+it.brand+' '+it.code+' '+it.cat).toLowerCase().includes(f))}
    tbl('ls-tbl',items,[
      {l:'Stock',fn:it=>`<span class="badge ${it.qty<=1?'low':'med'}">${it.qty}</span>`},
      {l:'Brand',fn:it=>`<strong>${it.brand}</strong>`},
      {l:'Product',k:'name'},
      {l:'Code',fn:it=>`<span class="mono">${it.code.substring(0,22)}</span>`},
      {l:'Category',fn:it=>`<span class="badge info">${it.cat}</span>`}
    ]);
  }
  renderLS();
  document.getElementById('ls-search').addEventListener('input',e=>renderLS(e.target.value));
};

// ==================== CATALOG ====================
renders.catalog=function(){
  const el=document.getElementById('sec-catalog');
  el.innerHTML=`
  <div class="sec-title"><div class="dot" style="background:#a78bfa"></div>Visual Product Catalog (Top 150 by Qty)</div>
  <input type="text" class="search" id="cat-search" placeholder="Search products by name, brand, code, or category...">
  <div style="margin-bottom:12px;display:flex;gap:6px;flex-wrap:wrap" id="cat-filters"></div>
  <div class="catalog-grid" id="cat-grid"></div>`;

  // Category filter chips
  const allCats=[...new Set(D.catalog.map(p=>p.cat))].sort();
  let activeFilter='';
  const filterEl=document.getElementById('cat-filters');
  filterEl.innerHTML='<button class="expand-btn" style="background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.3);color:#a78bfa" onclick="this.parentElement.dataset.filter=\'\';renderCat()">All</button>'+allCats.map(c=>`<button class="expand-btn" onclick="this.parentElement.dataset.filter='${c}';renderCat()">${c}</button>`).join('');

  window.renderCat=function(searchVal){
    const catFilter=filterEl.dataset.filter||'';
    const search=(searchVal||document.getElementById('cat-search')?.value||'').toLowerCase();
    let items=D.catalog;
    if(catFilter)items=items.filter(p=>p.cat===catFilter);
    if(search)items=items.filter(p=>(p.name+' '+p.brand+' '+p.code+' '+p.cat+' '+(p.intl||'')).toLowerCase().includes(search));

    document.getElementById('cat-grid').innerHTML=items.map(p=>{
      const cls=p.qty<=2?'crit':p.qty<=10?'warn':'ok';
      const stockBadge=p.qty<=2?'<span class="badge low">LOW</span>':p.qty<=10?'<span class="badge med">MEDIUM</span>':'<span class="badge high">IN STOCK</span>';
      return `<div class="pcard">
        <div class="brand">${p.brand}</div>
        <div class="pname">${p.name}</div>
        <div class="pcode">${p.code}</div>
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <div class="pqty ${cls}">${fmt(p.qty)}<span style="font-size:11px;color:#4b5563"> units</span></div>
          ${stockBadge}
        </div>
        <div class="pcat">${p.cat}${p.intl?' &bull; '+p.intl.substring(0,30):''}</div>
      </div>`;
    }).join('');
  };
  renderCat();
  document.getElementById('cat-search').addEventListener('input',e=>renderCat(e.target.value));
};
